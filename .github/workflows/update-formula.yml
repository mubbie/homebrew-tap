name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v5

      - name: Update gx-git formula
        if: github.event.client_payload.formula == 'gx-git'
        env:
          VERSION: ${{ github.event.client_payload.version }}
          DARWIN_ARM64: ${{ github.event.client_payload.darwin_arm64_sha256 }}
          LINUX_AMD64: ${{ github.event.client_payload.linux_amd64_sha256 }}
          LINUX_ARM64: ${{ github.event.client_payload.linux_arm64_sha256 }}
        run: |
          cat > gx-git.rb << ENDOFFORMULA
          # typed: false
          # frozen_string_literal: true

          # Auto-generated by gx-git release pipeline. DO NOT EDIT.
          class GxGit < Formula
            desc "Git Productivity Toolkit: smart undo, stacking, branch management and more"
            homepage "https://github.com/mubbie/gx-cli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/mubbie/gx-cli/releases/download/v${VERSION}/gx_${VERSION}_darwin_arm64.tar.gz"
                sha256 "${DARWIN_ARM64}"
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/mubbie/gx-cli/releases/download/v${VERSION}/gx_${VERSION}_linux_amd64.tar.gz"
                sha256 "${LINUX_AMD64}"
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/mubbie/gx-cli/releases/download/v${VERSION}/gx_${VERSION}_linux_arm64.tar.gz"
                sha256 "${LINUX_ARM64}"
              end
            end

            def install
              bin.install "gx"
            end

            test do
              assert_match "gx", shell_output("#{bin}/gx --version")
            end
          end
          ENDOFFORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' gx-git.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gx-git.rb
          git diff --cached --quiet || git commit -m "gx-git: update to v${{ github.event.client_payload.version }}"
          git push
